<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout1"
>
<head>
  <meta charset="UTF-8">
  <title>New Médecin</title>
</head>
<body>
<div class="p-3" layout:fragment="content">
  <h2 class="mb-4">New Médecin</h2>
  <form method="post" th:action="@{/admin/saveMedecin}" th:object="${medecin}">
    <div class="mb-3">
      <label class="form-label">Nom</label>
      <input type="text" class="form-control" th:field="*{nom}"
             th:classappend="${#fields.hasErrors('nom')} ? 'is-invalid'">
      <div class="invalid-feedback" th:errors="*{nom}"></div>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" th:field="*{email}"
             th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
      <div class="invalid-feedback" th:errors="*{email}"></div>
    </div>
    <div class="mb-3">
      <label class="form-label">Spécialité</label>
      <input type="text" class="form-control" th:field="*{specialite}"
             th:classappend="${#fields.hasErrors('specialite')} ? 'is-invalid'">
      <div class="invalid-feedback" th:errors="*{specialite}"></div>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
    <a class="btn btn-secondary" th:href="@{/user/medecins}">Cancel</a>
  </form>
</div>
</body>
</html>
